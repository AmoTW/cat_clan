<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的黑底網頁</title>
    <style>
        /* 這裡控制整個網頁的背景與文字顏色 */
        body {
            font-family: Arial, sans-serif;
            background-color: #000000; /* 使用深黑色（偏暗黑模式的質感黑） */
            color: #ffffff;            /* 將主要文字顏色改為純白 */
            text-align: center;
            padding-top: 50px;
        }

        /* 如果你有標題，也可以單獨微調標題的顏色 */
        h1 {
            color: #f8f9fa;            /* 亮灰色標題 */
        }

        /* 網頁內文的顏色 */
        p {
            color: #aaaaaa;            /* 淺灰色內文，看久了眼睛比較不吃力 */
        }

        /* 按鈕樣式微調，讓它在黑底上更顯眼 */
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff; /* 藍色按鈕 */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>👋 歡迎來到我的暗黑風格網站！</h1>
    <p>現在網頁已經成功變成酷炫的黑底了。</p>
    
    <button>點擊按鈕</button>

</body>
</html>
